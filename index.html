<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema de Tareas</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .badge {
      display: inline-block;
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      background: #1e293b;
      color: #38bdf8;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 2.5rem;
      margin: 0 0 0.75rem;
    }

    p {
      font-size: 1.1rem;
      color: #94a3b8;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="badge">En construcción</span>
    <h1>Sistema de Tareas</h1>
    <p>Esta página es un placeholder. El contenido llegará pronto 2026.</p>
  </div>
</body>
</html>
